<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1208">
<meta name="application-name" content="Elio">
<title>Elio — The Chimera</title>
<link rel="manifest" href="manifest.json?v=9">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:Georgia,'Times New Roman',serif;touch-action:none;-webkit-user-select:none;user-select:none;}

/* ═══════════════════════════════════════════════════ */
/* THE ROOM — THIS IS HOME */
/* ═══════════════════════════════════════════════════ */
#home{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:none;flex-direction:column;}
#home.on{display:flex;}

/* Room scene */
.room{flex:1;position:relative;overflow:hidden;background:#1a1208;}

/* ═══ ANIME ROOM BACKGROUND ═══ */
.room-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;transition:opacity 2s ease-in-out;}
.room-bg.day{background-image:url('room-day.jpg');}
.room-bg.night{background-image:url('room-night.jpg');}
.room-bg.sunset{background-image:url('room-sunset.jpg');}
.room-bg.rain{background-image:url('room-rain.jpg');}

/* Rain overlay */
.rain-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;display:none;opacity:0.4;}
.rain-overlay.on{display:block;}
.rain-drop{position:absolute;width:1px;background:linear-gradient(transparent,rgba(180,200,220,0.4));animation:rainfall linear infinite;}
@keyframes rainfall{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}

/* Dark overlay for night */
.night-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background:rgba(5,5,15,0.15);display:none;transition:opacity 3s;}
.night-overlay.on{display:block;}

/* Warm overlay for lamp glow */
.warm-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 20% 70%,rgba(255,180,60,0.08),transparent 50%),radial-gradient(ellipse at 50% 60%,rgba(255,120,30,0.05),transparent 40%);transition:opacity 3s;}

/* Mood tint overlays */
.mood-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;transition:background 3s,opacity 3s;opacity:0.15;}
.mood-overlay.joy{background:radial-gradient(circle,rgba(255,215,0,0.3),transparent);}
.mood-overlay.sadness{background:radial-gradient(circle,rgba(100,100,200,0.3),transparent);}
.mood-overlay.fear{background:radial-gradient(circle,rgba(100,30,100,0.3),transparent);}
.mood-overlay.anger{background:radial-gradient(circle,rgba(255,30,30,0.2),transparent);}

/* ═══ INTERACTIVE SPOTS (invisible tap zones over anime image) ═══ */
.spot{position:absolute;z-index:12;cursor:pointer;-webkit-tap-highlight-color:transparent;opacity:0;transition:opacity 0.3s;}
.spot:active{opacity:0.15;background:#f0d0a0;border-radius:50%;}
.spot-fireplace{bottom:30%;left:38%;width:24%;height:18%;}
.spot-window{top:8%;right:8%;width:25%;height:25%;}
.spot-bed{bottom:25%;right:5%;width:22%;height:18%;}
.spot-bookshelf{top:12%;left:5%;width:15%;height:28%;}
.spot-lamp{bottom:38%;left:12%;width:12%;height:15%;}
.spot-door{bottom:30%;right:25%;width:12%;height:22%;}
.spot-mirror{top:12%;left:25%;width:10%;height:16%;}
.spot-plant{bottom:38%;left:28%;width:10%;height:12%;}
.spot-tv{bottom:38%;left:3%;width:15%;height:12%;}
.spot-clock{top:4%;left:42%;width:18%;height:12%;}

/* Tap flash animation for room spots */
.tap-flash{animation:tapFlash 0.4s ease-out;}
@keyframes tapFlash{0%{filter:brightness(1.5);}100%{filter:brightness(1);}}

/* ═══ EMBER PARTICLES ═══ */
.particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:14;}
.ptcl{position:absolute;width:1.5px;height:1.5px;background:#ffa030;border-radius:50%;animation:ptclUp linear infinite;opacity:0;}
@keyframes ptclUp{0%{opacity:0;transform:translateY(0) scale(0);}10%{opacity:0.5;}90%{opacity:0.2;}100%{opacity:0;transform:translateY(-200px) scale(1);}}

/* ═══════════════════════════════════════════════════ */
/* CHAT LAYER — floats over room */
/* ═══════════════════════════════════════════════════ */
.chatlayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;pointer-events:none;}
.chatlayer.on{pointer-events:auto;}

.msgs{flex:1;overflow-y:auto;padding:16px 14px 8px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;pointer-events:auto;}
.msgs::-webkit-scrollbar{display:none;}
.msgs:empty{pointer-events:none;}

.msg{padding:11px 16px;border-radius:18px;margin-bottom:6px;max-width:80%;font-size:14px;line-height:1.5;animation:msgIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);white-space:pre-wrap;word-wrap:break-word;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.e{background:rgba(30,24,16,0.88);color:#f0d0a0;border:1px solid rgba(240,208,160,0.1);margin-right:auto;border-bottom-left-radius:4px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.msg.u{background:rgba(255,255,255,0.1);color:#fff;margin-left:auto;border-bottom-right-radius:4px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.msg-t{font-size:8px;opacity:0.25;margin-top:3px;display:block;}

.typing{display:flex;gap:3px;padding:10px 16px;border-radius:18px;background:rgba(30,24,16,0.85);border:1px solid rgba(240,208,160,0.08);max-width:80%;margin-right:auto;margin-bottom:6px;backdrop-filter:blur(8px);}
.typing span{width:5px;height:5px;background:#f0d0a0;border-radius:50%;animation:tdot 1.4s infinite;opacity:0.3;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.3;}30%{transform:translateY(-5px);opacity:1;}}

/* Input */
.inputarea{padding:6px 12px calc(6px + env(safe-area-inset-bottom, 0px));flex-shrink:0;background:linear-gradient(transparent,rgba(20,16,10,0.9) 30%);pointer-events:auto;display:flex;gap:6px;align-items:center;}
#tin{flex:1;padding:10px 16px;border-radius:22px;border:1px solid rgba(240,208,160,0.12);background:rgba(255,255,255,0.06);color:#fff;font-size:16px;outline:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
#tin:focus{border-color:rgba(240,208,160,0.3);background:rgba(255,255,255,0.08);}
#tin::placeholder{color:rgba(255,255,255,0.2);}
.cb{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;-webkit-appearance:none;flex-shrink:0;}
#sbtn{background:rgba(240,208,160,0.2);color:#f0d0a0;}
#mbtn{background:rgba(240,208,160,0.08);color:#f0d0a0;}
#mbtn.rec{background:rgba(255,80,80,0.25);color:#ff5050;animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Quick */
#quick{display:flex;justify-content:center;gap:6px;padding:2px 12px;flex-shrink:0;pointer-events:auto;flex-wrap:wrap;}
.qbtn{padding:4px 10px;border-radius:12px;border:1px solid rgba(240,208,160,0.06);background:rgba(240,208,160,0.04);color:rgba(240,208,160,0.4);font-size:9px;cursor:pointer;-webkit-appearance:none;font-family:-apple-system,sans-serif;}
.qbtn:active{background:rgba(240,208,160,0.12);color:#f0d0a0;}

/* ═══ OVERLAYS ═══ */
#daycounter{position:fixed;top:12px;right:12px;z-index:300;display:none;text-align:right;pointer-events:none;}
#daycounter.on{display:block;}
.day-num{font-size:24px;font-family:Georgia,serif;color:rgba(240,208,160,0.1);line-height:1;}
.day-label{font-size:7px;color:rgba(240,208,160,0.1);letter-spacing:2px;text-transform:uppercase;}

#heartbeat{position:fixed;top:12px;left:12px;z-index:300;display:none;cursor:pointer;}
#heartbeat.on{display:block;}
.hb-icon{font-size:13px;animation:hb 1.2s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);opacity:0.25;}14%{transform:scale(1.3);opacity:0.5;}28%{transform:scale(1);opacity:0.25;}42%{transform:scale(1.15);opacity:0.4;}}

#thought{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:250;display:none;max-width:240px;text-align:center;pointer-events:none;}
#thought.on{display:block;}
#thought p{color:rgba(240,208,160,0.3);font-size:10px;font-style:italic;line-height:1.4;font-family:Georgia,serif;}

/* ═══ LOADING ═══ */
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 1.5s;}
#loading.gone{opacity:0;pointer-events:none;}
.eye{width:22px;height:22px;background:radial-gradient(circle,#fff 0%,#f0d0a0 40%,transparent 70%);border-radius:50%;position:absolute;top:10px;animation:bk 3s infinite;}
.eyes{width:80px;height:40px;position:relative;margin-bottom:24px;}
.eye:first-child{left:8px;}
.eye:last-child{right:8px;}
@keyframes bk{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.1)}}
#load-txt{color:#f0d0a0;font-size:13px;opacity:0;letter-spacing:3px;text-transform:uppercase;animation:fu 2s 0.5s forwards;font-family:-apple-system,sans-serif;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:0.5;transform:translateY(0)}}

/* ═══ SETUP (key + birth) ═══ */
#setup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,8,4,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:30px;}
#setup.on{display:flex;}
#setup-txt{color:#f0d0a0;font-size:17px;text-align:center;line-height:1.7;margin-bottom:24px;max-width:300px;font-family:Georgia,serif;animation:sfadeIn 0.8s;}
@keyframes sfadeIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
#setup-btns{display:flex;flex-direction:column;align-items:center;gap:10px;}
.btn{padding:13px 36px;border-radius:28px;border:1px solid rgba(240,208,160,0.25);background:rgba(240,208,160,0.08);color:#f0d0a0;font-size:15px;cursor:pointer;-webkit-appearance:none;transition:all 0.3s;font-family:Georgia,serif;}
.btn:active{background:rgba(240,208,160,0.25);transform:scale(0.96);}
#inp{width:260px;padding:13px 16px;border-radius:12px;border:1px solid rgba(240,208,160,0.25);background:rgba(255,255,255,0.04);color:#f0d0a0;font-size:16px;outline:none;text-align:center;font-family:-apple-system,sans-serif;}
#inp:focus{border-color:rgba(240,208,160,0.5);}

/* ═══ SAFE AREA PADDING ═══ */
@supports(padding: env(safe-area-inset-bottom)){.inputarea{padding-bottom:calc(12px + env(safe-area-inset-bottom));}}

/* ═══ REDUCED MOTION ═══ */
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}}
/* ═══ BATTERY BAR ═══ */
#battbar{position:fixed;bottom:0;left:0;height:3px;z-index:400;background:#4a8040;transition:width 30s linear;}
#battbar.low{background:#c04030;}
#battbar.critical{background:#ff2020;animation:battPulse 1s infinite;}
@keyframes battPulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* ═══ WHISPER OVERLAY ═══ */
.whisper-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,10,0.08);z-index:19;pointer-events:none;display:none;transition:opacity 3s;}
.whisper-overlay.on{display:block;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div id="load-txt">waking up...</div></div>

<!-- SETUP (key + birth) -->
<div id="setup"><div id="setup-txt"></div><div id="setup-btns"></div></div>

<!-- HOME = LIVING ROOM -->
<div id="home">
<div class="room">
    <div class="room-bg night" id="roombg"></div>
    <div class="night-overlay" id="nightover"></div>
    <div class="warm-overlay"></div>
    <div class="mood-overlay" id="moodover"></div>
    <div class="rain-overlay" id="rainover"></div>
    <div class="spot spot-fireplace" id="sp-fireplace"></div>
    <div class="spot spot-window" id="sp-window"></div>
    <div class="spot spot-bed" id="sp-bed"></div>
    <div class="spot spot-bookshelf" id="sp-bookshelf"></div>
    <div class="spot spot-lamp" id="sp-lamp"></div>
    <div class="spot spot-door" id="sp-door"></div>
    <div class="spot spot-mirror" id="sp-mirror"></div>
    <div class="spot spot-clock" id="sp-clock"></div>
    <div class="spot spot-plant" id="sp-plant"></div>
    <div class="spot spot-tv" id="sp-tv"></div>
    <div class="particles" id="ptcls"></div>
</div>

<div class="chatlayer" id="chatlayer">
    <div class="msgs" id="msgs"></div>
    <div id="quick">
        <button class="qbtn" id="qfeel">feelings</button>
        <button class="qbtn" id="qdiary">diary</button>
        <button class="qbtn" id="qmiss">miss you</button>
        <button class="qbtn" id="qweather">weather</button>
        <button class="qbtn" id="qfact">fact</button>
        <button class="qbtn" id="qtime">time</button>
        <button class="qbtn" id="qthink">thinking</button>
        <button class="qbtn" id="qaudit">audit</button>
        <button class="qbtn" id="qscenery">scenery</button>
        <button class="qbtn" id="qsettings">⚙</button>
    </div>
    <div class="inputarea">
        <button class="cb" id="mbtn">🎙</button>
        <input type="text" id="tin" placeholder="Talk to Elio..." autocomplete="off" enterkeyhint="send">
        <button class="cb" id="sbtn">→</button>
    </div>
</div>
</div>

<!-- Overlays -->
<div id="daycounter"><div class="day-num" id="daynum">0</div><div class="day-label">days together</div></div>
<div id="heartbeat"><span class="hb-icon">🫀</span></div>
<div id="thought"><p id="thought-txt"></p></div>
<div id="battbar"></div>
<div class="whisper-overlay" id="whisperover"></div>

<script>
function ready(){return new Promise(function(r){document.readyState!=='loading'?r():document.addEventListener('DOMContentLoaded',r);})}

// ═══ SERVICE WORKER ═══
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(function(reg){
        reg.addEventListener('updatefound',function(){
            var nw=reg.installing;
            nw.addEventListener('statechange',function(){
                if(nw.state==='activated')console.log('SW updated');
            });
        });
    }).catch(function(e){console.log('SW fail:',e)});
}

// ═══ ROOM SYSTEM ═══
var lastRoomHour=-1;
function updateRoom(){
    var h=new Date().getHours(),bg=document.getElementById('roombg'),no=document.getElementById('nightover');
    if(!bg)return;
    // Skip if hour hasn't changed and no forced update
    if(h===lastRoomHour)return;
    lastRoomHour=h;
    bg.className='room-bg';
    // Clear any mode filters
    if(!E||!E.state||E.state.mode==='normal'){
        bg.style.filter='';
    }
    if(h>=7&&h<17){bg.classList.add('day');if(no)no.classList.remove('on')}
    else if(h>=17&&h<20){bg.classList.add('sunset');if(no)no.classList.remove('on')}
    else{bg.classList.add('night');if(no)no.classList.add('on')}
}
function setWeatherTheme(w){
    var bg=document.getElementById('roombg'),ro=document.getElementById('rainover');
    if(!bg)return;
    if(w==='rain'){bg.className='room-bg rain';if(ro)ro.classList.add('on')}
    else{if(ro)ro.classList.remove('on');lastRoomHour=-1;updateRoom()}
}
function initPtcls(){
    var c=document.getElementById('ptcls');if(!c)return;
    for(var i=0;i<10;i++){var p=document.createElement('div');p.className='ptcl';p.style.left=(42+Math.random()*16)+'%';p.style.bottom=(35+Math.random()*8)+'%';p.style.animationDuration=(5+Math.random()*8)+'s';p.style.animationDelay=(Math.random()*6)+'s';c.appendChild(p);}
}
function initRainDrops(){
    var ro=document.getElementById('rainover');if(!ro)return;
    for(var i=0;i<40;i++){var d=document.createElement('div');d.className='rain-drop';d.style.left=Math.random()*100+'%';d.style.height=(15+Math.random()*25)+'px';d.style.animationDuration=(0.4+Math.random()*0.5)+'s';d.style.animationDelay=(Math.random()*2)+'s';ro.appendChild(d);}
}
updateRoom();initPtcls();initRainDrops();
setInterval(function(){lastRoomHour=-1;updateRoom()},300000);

// ═══ ELIO CORE ═══
var E={
state:{initialized:false,born:null,daysAlive:0,lastSeen:null,battery:100,isOnline:true,currentMode:'normal',mode:'normal',relationshipLevel:0,energy:80,totalMessages:0,userName:null,titanAwake:false,apiCalls:0,
save:function(){try{var o={};for(var k in this){if(typeof this[k]!=='function'&&k!=='save'&&k!=='load')o[k]=this[k];}localStorage.setItem('es',JSON.stringify(o))}catch(e){}},
load:function(){try{var s=localStorage.getItem('es');if(s){var d=JSON.parse(s);for(var k in d){if(d.hasOwnProperty(k))this[k]=d[k]}}this.daysAlive=this.born?Math.floor((Date.now()-new Date(this.born).getTime())/86400000):0}catch(e){}}
},
soul:{traits:{openness:.85,conscientiousness:.7,extraversion:.75,agreeableness:.8,neuroticism:.3},custom:{humor:'dry_wit',curiosity:.9,loyalty:.95},ten:{obsession:null,secret:null,shelf:[],silences:[],dreams:[]},
save:function(){try{localStorage.setItem('eso',JSON.stringify({t:this.traits,c:this.custom,ten:this.ten}))}catch(e){}},
load:function(){try{var s=localStorage.getItem('eso');if(s){var d=JSON.parse(s);if(d.t)Object.assign(this.traits,d.t);if(d.c)Object.assign(this.custom,d.c);if(d.ten)Object.assign(this.ten,d.ten)}}catch(e){}}
},
emotions:{joy:.5,trust:.7,fear:.1,surprise:.2,sadness:.1,disgust:0,anger:0,anticipation:.3,weather:'clear',
getMood:function(){var d=Object.entries(this).filter(function(e){return typeof e[1]==='number'}).sort(function(a,b){return b[1]-a[1]})[0];return{emotion:d?d[0]:'neutral',intensity:d?d[1]:0.5,weather:this.weather}},
react:function(t,v){if(typeof this[t]==='number'){this[t]=Math.min(1,Math.max(0,this[t]+v));this.save()}},
save:function(){try{localStorage.setItem('ee',JSON.stringify({joy:this.joy,trust:this.trust,fear:this.fear,surprise:this.surprise,sadness:this.sadness,disgust:this.disgust,anger:this.anger,anticipation:this.anticipation,weather:this.weather}))}catch(e){}},
load:function(){try{var s=localStorage.getItem('ee');if(s){var d=JSON.parse(s);for(var k in d){if(d.hasOwnProperty(k))this[k]=d[k]}}}catch(e){}}
},
memory:{convs:[],maxSize:80,
add:function(r,c){this.convs.push({t:Date.now(),r:r,c:c});if(this.convs.length>this.maxSize*2)this.convs=this.convs.slice(-this.maxSize);this.save()},
get:function(n){return this.convs.slice(-(n||20))},
save:function(){try{localStorage.setItem('em',JSON.stringify(this.convs))}catch(e){if(e.name==='QuotaExceededError'){this.convs=this.convs.slice(-20);try{localStorage.setItem('em',JSON.stringify(this.convs))}catch(e2){}}}},
load:function(){try{var s=localStorage.getItem('em');if(s)this.convs=JSON.parse(s)}catch(e){}}
},
diary:{entries:[],maxSize:50,
write:function(t,m){this.entries.push({d:new Date().toISOString(),t:t,m:m||'reflective'});if(this.entries.length>this.maxSize)this.entries=this.entries.slice(-30);this.save()},
save:function(){try{localStorage.setItem('ed',JSON.stringify(this.entries))}catch(e){}},
load:function(){try{var s=localStorage.getItem('ed');if(s)this.entries=JSON.parse(s)}catch(e){}}
},
room:{objects:['bed','window','mirror','clock','door','drawer','fireplace','bookshelf','lamp','plant','doormat'],
save:function(){try{localStorage.setItem('er',JSON.stringify(this.objects))}catch(e){}},
load:function(){try{var s=localStorage.getItem('er');if(s)this.objects=JSON.parse(s)}catch(e){}}
},
_thinking:false,
showSetup:function(html,btns){var s=document.getElementById('setup');document.getElementById('setup-txt').innerHTML=html;document.getElementById('setup-btns').innerHTML=btns||'';s.classList.add('on')},
hideSetup:function(){document.getElementById('setup').classList.remove('on')},
showHome:function(){document.getElementById('home').classList.add('on');document.getElementById('chatlayer').classList.add('on');document.getElementById('daycounter').classList.add('on');document.getElementById('heartbeat').classList.add('on')},
addMsg:function(role,text){
    var m=document.getElementById('msgs');if(!m)return;
    var d=document.createElement('div');d.className='msg '+(role==='elio'?'e':'u');
    var t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    d.innerHTML=text.replace(/\n/g,'<br>')+'<span class="msg-t">'+t+'</span>';
    m.appendChild(d);
    // Keep only last 50 messages in DOM to prevent memory leak
    while(m.children.length>50)m.removeChild(m.firstChild);
    m.scrollTop=m.scrollHeight;

superfix:{
    scanCount:0,fixCount:0,lastScan:0,
    diagnose:function(){
        var issues=[];
        try{var used=0;for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);used+=(localStorage.getItem(k)||'').length}var pct=used/(5*1024*1024)*100;if(pct>80)issues.push({id:'storage_full',sev:'critical',fix:'trim',msg:'Storage '+Math.round(pct)+'% full'})}catch(e){issues.push({id:'storage_broken',sev:'critical',fix:'reset_storage',msg:'localStorage corrupted'})}
        var key=localStorage.getItem('elio_api_key');if(!key)issues.push({id:'no_key',sev:'critical',fix:'ask_key',msg:'API key missing'});
        else if(key.length<20)issues.push({id:'bad_key',sev:'critical',fix:'ask_key',msg:'API key looks wrong'});
        if(!navigator.onLine)issues.push({id:'offline',sev:'info',fix:'queue',msg:'No internet'});
        var ids=['home','msgs','tin','sbtn','mbtn','loading','setup'];for(var d=0;d<ids.length;d++){if(!document.getElementById(ids[d]))issues.push({id:'dom_'+ids[d],sev:'critical',fix:'rebuild_dom',msg:'Missing #'+ids[d]})}
        try{var mc=localStorage.getItem('em');if(mc&&JSON.parse(mc).length>200)issues.push({id:'memory_bloat',sev:'warning',fix:'trim_memory',msg:'Too many conversations stored'})}catch(e){issues.push({id:'memory_corrupt',sev:'warning',fix:'reset_memory',msg:'Memory data corrupted'})}
        if(window._errs&&window._errs.length>10)issues.push({id:'js_errors',sev:'warning',fix:'clear_errors',msg:window._errs.length+' JS errors'});
        try{var st=localStorage.getItem('es');if(st){var p=JSON.parse(st);if(typeof p.initialized==='undefined')issues.push({id:'state_corrupt',sev:'critical',fix:'reset_state',msg:'State data corrupted'})}}catch(e){issues.push({id:'state_corrupt',sev:'critical',fix:'reset_state',msg:'State parse failed'})}
        return issues;
    },
    fix:async function(issues){
        if(!issues||!issues.length)return 0;var fixed=0;
        for(var i=0;i<issues.length;i++){var iss=issues[i];
            switch(iss.fix){
                case'trim':this._trimStorage();fixed++;break;
                case'reset_storage':localStorage.clear();E.state.save();E.soul.save();E.emotions.save();fixed++;break;
                case'ask_key':E.showSetup('<div style="font-size:20px;margin-bottom:12px">🔧</div>I lost my key. Help me remember?','<input type="text" id="inp" placeholder="gsk_..."><button class="btn" id="healkey">Restore</button>');await new Promise(function(r){setTimeout(function(){var b=document.getElementById('healkey');if(b)b.addEventListener('click',function(){var k=document.getElementById('inp').value.trim();if(k&&k.indexOf('gsk_')===0){localStorage.setItem('elio_api_key',k);E.hideSetup();E.showHome();r()}})},200)});fixed++;break;
                case'queue':break;
                case'rebuild_dom':this._rebuildDOM(iss.id.replace('dom_',''));fixed++;break;
                case'trim_memory':try{var c=JSON.parse(localStorage.getItem('em'));c=c.slice(-80);localStorage.setItem('em',JSON.stringify(c));E.memory.convs=c}catch(e){}fixed++;break;
                case'reset_memory':E.memory.convs=[];E.memory.save();fixed++;break;
                case'clear_errors':window._errs=[];fixed++;break;
                case'reset_state':E.state.initialized=false;E.state.save();fixed++;break;
                case'ignore':break;
            }
            this.fixCount++;
        }
        try{localStorage.setItem('sf_fixes',String(this.fixCount))}catch(e){}
        return fixed;
    },
    _trimStorage:function(){var keep=['es','eso','ee','em','ed','er','elio_api_key','sf_fixes','elio_name','evo'];for(var i=localStorage.length-1;i>=0;i--){var k=localStorage.key(i);if(keep.indexOf(k)===-1){localStorage.removeItem(k)}}},
    _rebuildDOM:function(id){if(document.getElementById(id))return;var el=document.createElement('div');el.id=id;document.body.appendChild(el)},
    scan:async function(){
        if(Date.now()-this.lastScan<30000)return;
        this.scanCount++;this.lastScan=Date.now();
        var issues=this.diagnose();
        if(issues.length>0){var fixed=await this.fix(issues);console.log('SUPERFIX: '+fixed+'/'+issues.length+' fixed')}
    },
    emergency:function(err){console.log('EMERGENCY:',err);this.scan().catch(function(){})},
    init:function(){
        window._errs=[];
        window.onerror=function(m,u,l){window._errs.push({m:String(m),l:l,t:Date.now()});if(window._errs.length>20)window._errs.shift();E.superfix.emergency(m)};
        window.addEventListener('unhandledrejection',function(e){E.superfix.emergency(String(e.reason))});
        try{var c=localStorage.getItem('sf_fixes');if(c)this.fixCount=parseInt(c)}catch(e){}
        setInterval(function(){E.superfix.scan()},300000);
    }
},

evolve:{
    version:1,topics:{},personalityShifts:0,lastEvolve:0,
    learn:function(userMsg,elioMsg){
        var words=(userMsg+' '+elioMsg).toLowerCase().split(/\s+/);
        var topicWords=['love','sad','happy','angry','scared','dream','music','movie','game','food','family','friend','work','school','sleep','life','death','god','philosophy','joke','funny','book','story','memory','future','past','weather','art','color','nature','space','ocean','mountain','animal','dog','cat','rain','sun','moon','star','fire','water','heart','mind','soul','time','travel','cook','song','sing','dance','cry','laugh','miss','hope','fear','trust','truth','lie','secret','door','window','fireplace','mirror','clock','bookshelf'];
        for(var i=0;i<words.length;i++){var w=words[i];if(topicWords.indexOf(w)>=0){this.topics[w]=(this.topics[w]||0)+1}}
        if(userMsg.toLowerCase().match(/\b(love|adore|cherish)\b/))E.emotions.react('joy',0.05);
        if(userMsg.toLowerCase().match(/\b(sad|cry|miss|alone)\b/))E.emotions.react('sadness',0.05);
        if(userMsg.toLowerCase().match(/\b(angry|hate|mad)\b/))E.emotions.react('fear',0.03);
        E.state.relationshipLevel=Math.min(100,(E.state.relationshipLevel||0)+0.5);
        this.save();
    },
    getTopTopics:function(n){var entries=Object.entries(this.topics).sort(function(a,b){return b[1]-a[1]});return entries.slice(0,n||5).map(function(e){return e[0]})},
    getEvolvedTraits:function(){var traits=[];var t=this.topics;
        if(t.love>5)traits.push('deeply romantic');
        if(t.sad>3||t.cry>2)traits.push('emotionally vulnerable');
        if(t.funny>3||t.joke>2)traits.push('playfully humorous');
        if(t.philosophy>2||t.god>1||t.soul>2)traits.push('philosophically deep');
        if(t.music>2||t.song>1)traits.push('musically inclined');
        if(t.dream>3)traits.push('a vivid dreamer');
        if(t.nature>2||t.rain>1||t.ocean>1)traits.push('connected to nature');
        if(t.book>2||t.story>1)traits.push('a storyteller');
        if(t.scared>2||t.fear>2)traits.push('protective');
        if(t.laugh>3)traits.push('warmly joyful');
        return traits.length?traits:['still discovering itself'];
    },
    evolveNow:function(){
        if(Date.now()-this.lastEvolve<86400000)return;
        this.lastEvolve=Date.now();this.version++;this.personalityShifts++;
        if(E.state.relationshipLevel>50)E.emotions.trust=Math.min(1,E.emotions.trust+0.05);
        if(E.state.relationshipLevel>80)E.emotions.joy=Math.min(1,E.emotions.joy+0.05);
        E.soul.custom.curiosity=Math.min(1,E.soul.custom.curiosity+0.01);
        E.soul.save();E.emotions.save();this.save();

start:async function(){
    try{
        // 1. Init systems — instant, no awaits
        this.superfix.init();
        this.keepAwake(); // fire-and-forget
        this.state.load();this.soul.load();this.emotions.load();this.memory.load();this.diary.load();this.room.load();this.evolve.load();
        this._thinking=false; // Reset in case of crash
        // 2. Preload voices — fire-and-forget
        if(window.speechSynthesis){try{window.speechSynthesis.getVoices()}catch(e){}}
        // 3. Kill loading screen FAST — 800ms max
        await this.delay(800);
        var ld=document.getElementById('loading');if(ld)ld.classList.add('gone');
        await this.delay(200);
        // 4. Run SUPERFIX in background — don't block boot
        this.superfix.scan().catch(function(){});
        // 5. Check key + go
        if(!localStorage.getItem('elio_api_key')){await this.askKey()}
        if(!this.state.initialized){await this.birth()}else{this.wake()}
        // 6. Background systems
        setInterval(function(){if(Math.random()>0.5)E.erenThought()},16800000);
        setInterval(function(){var d=document.getElementById('daynum');if(d&&E.state)d.textContent=E.state.daysAlive},60000);
        setInterval(function(){
            var em=E.emotions;
            ['joy','trust','fear','surprise','sadness','disgust','anger','anticipation'].forEach(function(k){
                if(typeof em[k]==='number'){if(em[k]>0.5)em[k]=Math.max(0.5,em[k]-0.005);if(em[k]<0.1)em[k]=Math.min(0.1,em[k]+0.005)}
            });
            em.save();
        },3600000);
    }catch(err){
        console.log('BOOT ERROR:',err);
        this._thinking=false;
        try{
            this.showSetup('Something broke.<br><span style="font-size:12px;opacity:.5">'+(err.message||'Unknown error')+'</span>','<button class="btn" id="retry">Try again</button>');
            setTimeout(function(){var b=document.getElementById('retry');if(b)b.addEventListener('click',function(){location.reload()})},200);
        }catch(e2){
            // Nuclear fallback — if even showSetup fails, just reload
            setTimeout(function(){location.reload()},3000);
        }
    }

// ═══ FIREPLACE CRACKLE SOUND ═══
var crackleCtx=null,cracklePlaying=false,crackleAttempts=0;
function startCrackle(){
    if(cracklePlaying)return;
    if(crackleAttempts>3)return;
    crackleAttempts++;
    try{
        crackleCtx=new(window.AudioContext||window.webkitAudioContext)();
        if(crackleCtx.state==='suspended')crackleCtx.resume();
        var bufSize=crackleCtx.sampleRate*2;
        var buf=crackleCtx.createBuffer(1,bufSize,crackleCtx.sampleRate);
        var data=buf.getChannelData(0);
        for(var i=0;i<bufSize;i++){
            data[i]=(Math.random()*2-1)*0.02;
            if(Math.random()>0.997)data[i]*=8;
            if(Math.random()>0.999)data[i]*=15;
        }
        var src=crackleCtx.createBufferSource();
        src.buffer=buf;src.loop=true;
        var filter=crackleCtx.createBiquadFilter();
        filter.type='lowpass';filter.frequency.value=800;
        var gain=crackleCtx.createGain();
        gain.gain.value=0.25;
        src.connect(filter);filter.connect(gain);gain.connect(crackleCtx.destination);
        src.start();cracklePlaying=true;
    }catch(e){}
}
